services:
  - type: web
    name: llamabuzz
    env: php
    buildCommand: ''
    startCommand: 'php -S 0.0.0.0:10000 -t .'
    envVars:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
